<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horus Control Center</title>
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <header>
      <h1>Horus Control Center</h1>
    </header>

    <main>
      <details class="dashboard-shell operational-shell" open>
        <summary>Dashboard operacional</summary>
        <div class="frame-wrap">
          <iframe
            class="dashboard-frame dashboard-frame-operational"
            src=""
            data-grafana-path="/d/horus-power-monitor/c4i-monitor?orgId=1&kiosk"
            title="Grafana Power Dashboard"
            loading="lazy"
          ></iframe>
        </div>
      </details>

      <section class="dashboard-shell alarm-shell">
        <div class="section-head">
          <h2>Dashboard de alarmas</h2>
          <a class="download-link" href="/alarms/export.csv">Descargar historico de alarmas</a>
        </div>
        <div class="frame-wrap">
          <iframe
            class="dashboard-frame dashboard-frame-alarms"
            src=""
            data-grafana-path="/d/horus-alarms-monitor/horus-alarmas?orgId=1&kiosk"
            title="Grafana Alarm Dashboard"
            loading="lazy"
          ></iframe>
        </div>
      </section>
    </main>
    <script>
      const grafanaBaseUrl = `${window.location.protocol}//${window.location.hostname}:3000`;
      document.querySelectorAll("iframe[data-grafana-path]").forEach((frame) => {
        frame.src = `${grafanaBaseUrl}${frame.dataset.grafanaPath}`;
      });
    </script>
  </body>
</html>
