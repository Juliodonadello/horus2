<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horus Control Center</title>
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <header>
      <h1>Horus Control Center</h1>
      <p>Grafana embebido + simulaciones avanzadas bajo demanda.</p>
    </header>

    <main>
      <section class="controls">
        <h2>Laboratorio de simulaciones</h2>
        <div class="form-grid">
          <label>Escenario
            <select id="scenarioSelect"></select>
          </label>
          <label>Site ID
            <input id="siteId" value="site_010" />
          </label>
          <label>Duración (s)
            <input id="duration" type="number" min="10" value="120" />
          </label>
          <label>Intervalo (s)
            <input id="interval" type="number" min="1" step="0.5" value="2" />
          </label>
        </div>
        <button id="startBtn">Iniciar simulación</button>
      </section>

      <section class="runs">
        <h2>Ejecuciones activas</h2>
        <div id="runList" class="run-list"></div>
      </section>

      <section class="grafana">
        <h2>Dashboard operacional (Grafana embebido)</h2>
        <iframe
          src="http://localhost:3000/d/horus-power-monitor/c4i-monitor?orgId=1&kiosk"
          title="Grafana Dashboard"
          loading="lazy"
        ></iframe>
      </section>
    </main>

    <script src="/app/app.js"></script>
  </body>
</html>
